; =============================================================
;  ScaleReader v2 — PlatformIO Project Config
;  Board : ESP32 DevKit (or any ESP32 module with 4MB flash)
; =============================================================

[env:esp32dev]
; Platform pinned — prevents silent breaking changes on `pio update`
platform  = espressif32@6.9.0
board     = esp32dev
framework = arduino

; no_ota partition: 4MB flash, single 3MB app slot
; Required — default 1.2MB app partition is too small for BT + libs
board_build.partitions = no_ota.csv

; Serial monitor
monitor_speed   = 115200
; Exception decoder: converts raw crash addresses to file+line in stack traces
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -O2

; U8g2 replaces Adafruit SSD1306 + Adafruit GFX entirely.
; Works correctly on BOTH SSD1306 and SH1106 controllers —
; the two chips are physically identical but differ in RAM layout.
; Adafruit's library uses horizontal addressing which SH1106 doesn't support,
; causing the "horizontal black lines" artifact on ~50% of cheap 0.96" modules.
lib_deps =
    olikraus/U8g2 @ ^2.35.30